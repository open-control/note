name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MS_DEV_ENV_REPOSITORY: petitechose-midi-studio/ms-dev-env
  MS_DEV_ENV_SHA: 2d185972e5e8a76ad25ead9ee314c045fbf6ec9e
  OPEN_CONTROL_FRAMEWORK_SHA: ae0fe6dad094775f069dca37ac297b4706be95c3

jobs:
  unit_tests:
    name: unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout ms-dev-env
        uses: actions/checkout@v6
        with:
          repository: ${{ env.MS_DEV_ENV_REPOSITORY }}
          ref: ${{ env.MS_DEV_ENV_SHA }}
          path: workspace
          persist-credentials: false

      - name: Checkout framework
        uses: actions/checkout@v6
        with:
          repository: open-control/framework
          ref: ${{ env.OPEN_CONTROL_FRAMEWORK_SHA }}
          path: workspace/open-control/framework
          persist-credentials: false

      - name: Checkout note
        uses: actions/checkout@v6
        with:
          path: workspace/open-control/note
          persist-credentials: false

      - name: Setup ms runtime
        uses: ./workspace/.github/actions/setup-ms-runtime
        with:
          working-directory: workspace

      - name: Cache ms test tools
        uses: actions/cache@v5
        with:
          path: |
            workspace/tools
            workspace/.ms/cache/downloads
            workspace/.ms/cache/test-deps
          key: ${{ runner.os }}-ms-test-tools-${{ env.MS_DEV_ENV_SHA }}-${{ hashFiles('workspace/ms/data/toolchains.toml', 'workspace/ms/data/test_dependencies.toml') }}
          restore-keys: |
            ${{ runner.os }}-ms-test-tools-${{ env.MS_DEV_ENV_SHA }}-

      - name: Sync test tools
        working-directory: workspace
        run: uv run ms sync --test-tools

      - name: Test
        working-directory: workspace
        run: uv run ms test open-control-note
