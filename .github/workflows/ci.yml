name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PLATFORMIO_VERSION: "6.1.18"

jobs:
  native_tests:
    name: native tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: note

      - name: Checkout framework
        uses: actions/checkout@v6
        with:
          repository: open-control/framework
          path: framework

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PlatformIO
        shell: bash
        working-directory: note
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install "platformio==${PLATFORMIO_VERSION}"

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('note/platformio.ini') }}

      - name: Test
        shell: bash
        working-directory: note
        run: |
          set -euo pipefail
          python -m platformio test -e native
