; Open Control Note - legacy PlatformIO native environment
;
; Supported unit-test workflow:
;   uv run ms test open-control-note

[platformio]
default_envs = native

[env:native]
platform = native
build_flags =
    -std=c++17
    -I src
extra_scripts =
    pre:script/dev/pio_pre_windows_toolchain.py
lib_deps =
    oc-framework=symlink://../framework
test_build_src = yes
